server {
    listen 80;
    server_name _;

    root  /var/www/html/public;
    index index.php;
    charset utf-8;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-XSS-Protection       "1; mode=block"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml;

    # ── Vite build assets — immutable, cache forever ─────────────────────────────
    location ^~ /build {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Laravel storage (public disk) ────────────────────────────────────────────
    location ^~ /storage {
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Well-known (needed for Let's Encrypt, etc.) ───────────────────────────────
    location ^~ /.well-known {
        allow all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Main request handler ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        # Path on the PHP-FPM container (same volume mount point)
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_hide_header     X-Powered-By;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_intercept_errors on;
    }

    # ── Block hidden files ────────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}

# =============================================================================
# HTTPS server — uncomment and configure after obtaining SSL certificates.
# Example using Let's Encrypt (certbot): mount /etc/letsencrypt as a volume
# and adjust the certificate paths below.
# =============================================================================
#
# server {
#     listen 443 ssl http2;
#     server_name yourdomain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#
#     # ... same location blocks as HTTP server above ...
# }
#
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }
