name: CI/CD — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME becomes: ghcr.io/<owner>/<repo>  e.g. ghcr.io/johndoe/aruna-web
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Job 1: Build Docker image and push to GHCR ─────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # needed to push to ghcr.io

    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Pre-build: generate Wayfinder TS bindings + compile frontend ─────────
      # Running these on the CI runner (not inside Docker) is more reliable
      # because the ubuntu-latest environment has a well-tested PHP + Node stack.
      # The compiled public/build/ directory is then passed into the Docker context.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-scripts --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Wayfinder bindings and build frontend assets
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database && touch database/database.sqlite
          php artisan package:discover --ansi
          php artisan wayfinder:generate
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided by GitHub, no setup needed

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with short git SHA:  sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # Also tag as :latest on every push to main
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to VPS via SSH ───────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build # only runs after image is built & pushed
    environment: production # optional: set up required approvals in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # All values passed as env vars to the remote shell (masked in logs).
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          # GHCR requires lowercase image names; tr ensures compatibility
          # regardless of how github.repository is cased.
          APP_IMAGE: ${{ needs.build.outputs.image }}
          APP_DIR: ${{ secrets.VPS_APP_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,APP_IMAGE,APP_DIR
          script: |
            set -e

            # ── 0. Pre-flight checks ──────────────────────────────────────────
            echo "→ [0/8] Pre-flight checks"
            docker info   > /dev/null 2>&1 || { echo "ERROR: Docker daemon is not running"; exit 1; }
            docker compose version > /dev/null 2>&1 || { echo "ERROR: Docker Compose v2 is not available (need 'docker compose', not 'docker-compose')"; exit 1; }

            # ── 1. Navigate to project directory ─────────────────────────────
            echo "→ [1/8] Navigating to ${APP_DIR}"
            [ -d "$APP_DIR" ] || { echo "ERROR: Directory '${APP_DIR}' not found on VPS. Clone the repo first."; exit 1; }
            cd "$APP_DIR"

            # ── 2. Pull latest code (docker-compose.yml, nginx config, etc.) ─
            # The VPS must have a deploy key with read access to the GitHub repo.
            # Generate one: ssh-keygen -t ed25519 -C "vps-deploy"
            # Add the public key as a read-only GitHub Deploy Key.
            echo "→ [2/8] Pulling latest code from GitHub"
            git pull origin main

            # ── 3. Login to GHCR and pull the pre-built image ────────────────
            # Normalise to lowercase — GHCR stores all image names in lowercase.
            APP_IMAGE=$(echo "$APP_IMAGE" | tr '[:upper:]' '[:lower:]')
            echo "→ [3/8] Logging in to GHCR and pulling: ${APP_IMAGE}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$APP_IMAGE"

            # ── 4. Update APP_IMAGE in .env so Compose uses the GHCR image ───
            echo "→ [4/8] Updating APP_IMAGE in .env"
            [ -f .env ] || { echo "ERROR: .env not found at $(pwd)/.env — copy .env.example and fill in your values."; exit 1; }
            if grep -q '^APP_IMAGE=' .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env
            fi

            # ── 5. Remove stale public assets volume (rebuilt from new image) ─
            echo "→ [5/8] Removing stale public assets volume"
            docker volume rm aruna_web_public 2>/dev/null || true

            # ── 6. Restart app container with new image ───────────────────────
            #       --no-deps keeps db and redis running without interruption
            echo "→ [6/8] Restarting app container"
            docker compose up -d --no-deps app

            # ── 7. Give app a moment to initialise, then refresh nginx ────────
            echo "→ [7/8] Refreshing nginx"
            sleep 5
            docker compose up -d --no-deps nginx

            # ── 8. Remove dangling images to save disk space ──────────────────
            echo "→ [8/8] Pruning old images"
            docker image prune -f

            echo "✓ Deployment complete."
